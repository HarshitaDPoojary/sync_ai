<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sync_ai — Meeting Copilot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Top bar ── */
    #topbar { display: flex; align-items: center; gap: 16px; padding: 12px 24px; background: #1a1d27; border-bottom: 1px solid #2d3148; }
    #topbar h1 { font-size: 18px; font-weight: 700; color: #a78bfa; }
    #nav-links { display: flex; gap: 12px; }
    #nav-links a { font-size: 13px; color: #94a3b8; text-decoration: none; }
    #nav-links a:hover { color: #e2e8f0; }
    #user-info { font-size: 13px; color: #94a3b8; margin-left: auto; }
    button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; transition: opacity .15s; }
    button:hover { opacity: .85; }
    #btn-signout { background: #334155; color: #e2e8f0; padding: 6px 12px; font-size: 12px; }

    /* ── Dashboard layout ── */
    #dashboard { display: none; flex: 1; padding: 32px 24px; gap: 32px; max-width: 900px; margin: 0 auto; width: 100%; flex-direction: column; }

    /* ── Start form ── */
    #start-form { display: flex; flex-direction: column; gap: 14px; background: #1a1d27; border-radius: 12px; padding: 24px; border: 1px solid #2d3148; }
    #start-form h2 { font-size: 18px; color: #c4b5fd; margin-bottom: 4px; }
    #start-form input, #start-form textarea {
      width: 100%; background: #0f1117; border: 1px solid #3b4270;
      color: #e2e8f0; border-radius: 8px; padding: 10px 14px; font-size: 14px;
    }
    #start-form textarea { height: 70px; resize: vertical; }
    #start-form label { font-size: 12px; color: #94a3b8; }
    #btn-start { background: #7c3aed; color: #fff; padding: 12px; font-size: 14px; }

    /* ── Meeting history ── */
    #history-section h2 { font-size: 16px; color: #94a3b8; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; font-size: 11px; }
    #meetings-list { display: flex; flex-direction: column; gap: 8px; }
    .meeting-row { background: #1a1d27; border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 16px; border: 1px solid #2d3148; text-decoration: none; color: inherit; }
    .meeting-row:hover { border-color: #7c3aed; }
    .meeting-row .mtitle { font-size: 14px; font-weight: 600; color: #e2e8f0; }
    .meeting-row .mtime { font-size: 12px; color: #64748b; }
    .status-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; margin-left: auto; }
    .status-badge.active { background: #14532d; color: #22c55e; }
    .status-badge.ended  { background: #1e293b; color: #94a3b8; }

    .empty { color: #94a3b8; font-size: 13px; text-align: center; padding: 24px; }
    #loading { text-align: center; padding: 60px; color: #94a3b8; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>sync_ai</h1>
  <div id="nav-links">
    <a href="/">Dashboard</a>
    <a href="/settings">Integrations</a>
  </div>
  <div id="user-info"></div>
  <button id="btn-signout" onclick="signOut()" style="display:none">Sign out</button>
</div>

<div id="loading">Loading...</div>

<div id="dashboard">
  <!-- Start form -->
  <div id="start-form">
    <h2>Start a Meeting Session</h2>
    <label>Meeting URL (Zoom / Google Meet / Teams)</label>
    <input id="meeting-url" type="url" placeholder="https://zoom.us/j/..." />
    <label>Meeting Title</label>
    <input id="meeting-title" type="text" placeholder="Sprint Review" />
    <label>Participant emails (one per line)</label>
    <textarea id="participant-emails" placeholder="alice@company.com&#10;bob@company.com"></textarea>
    <label>Slack channel ID (optional — e.g. C0123456789)</label>
    <input id="slack-channel-id" type="text" placeholder="C0123456789" />
    <button id="btn-start" onclick="startSession()">Join Meeting</button>
  </div>

  <!-- Meeting history -->
  <div id="history-section">
    <h2>Past Meetings</h2>
    <div id="meetings-list"><p class="empty">No meetings yet.</p></div>
  </div>
</div>

<script>
  let __clerk = null;

  async function apiFetch(url, options = {}) {
    const token = await __clerk.session.getToken();
    options.headers = {
      ...options.headers,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
    };
    return fetch(url, options);
  }

  async function initApp() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';

    const me = await (await apiFetch('/me')).json();
    document.getElementById('user-info').textContent = me.email || me.name || '';
    document.getElementById('btn-signout').style.display = '';

    loadMeetings();
  }

  async function loadMeetings() {
    const res = await apiFetch('/meetings');
    const data = await res.json();
    const list = document.getElementById('meetings-list');
    if (!data.meetings || !data.meetings.length) {
      list.innerHTML = '<p class="empty">No meetings yet.</p>';
      return;
    }
    list.innerHTML = '';
    data.meetings.forEach(m => {
      const a = document.createElement('a');
      a.href = `/meeting?id=${m.id}`;
      a.className = 'meeting-row';
      const left = document.createElement('div');
      const title = document.createElement('div');
      title.className = 'mtitle';
      title.textContent = m.title;
      const time = document.createElement('div');
      time.className = 'mtime';
      time.textContent = new Date(m.started_at).toLocaleString();
      left.appendChild(title);
      left.appendChild(time);
      const badge = document.createElement('span');
      badge.className = `status-badge ${m.status}`;
      badge.textContent = m.status;
      a.appendChild(left);
      a.appendChild(badge);
      list.appendChild(a);
    });
  }

  async function startSession() {
    const url     = document.getElementById('meeting-url').value.trim();
    const title   = document.getElementById('meeting-title').value.trim() || 'Meeting';
    const emails  = document.getElementById('participant-emails').value.trim().split('\n').filter(Boolean);
    const channel = document.getElementById('slack-channel-id').value.trim() || null;
    if (!url) { alert('Please enter a meeting URL'); return; }

    const body = { meeting_url: url, title, participant_emails: emails };
    if (channel) body.slack_channel_id = channel;

    const res = await apiFetch('/sessions', {
      method: 'POST',
      body: JSON.stringify(body),
    });
    if (!res.ok) { alert('Failed to start session: ' + (await res.text())); return; }
    const data = await res.json();
    window.location.href = `/meeting?id=${data.meeting_id}`;
  }

  async function signOut() {
    await __clerk.signOut();
    window.location.reload();
  }

  function showFatal(message) {
    const loading = document.getElementById('loading');
    loading.style.display = 'block';
    loading.textContent = message;
  }

  function loadClerkScript(clerkPublishableKey, clerkFrontendApi) {
    const frontendApi = (() => {
      if (!clerkFrontendApi) return '';
      try {
        return new URL(clerkFrontendApi.includes('://') ? clerkFrontendApi : `https://${clerkFrontendApi}`).host;
      } catch {
        return clerkFrontendApi.replace(/^https?:\/\//, '').replace(/\/$/, '');
      }
    })();
    const urls = [
      frontendApi ? `https://${frontendApi}/npm/@clerk/clerk-js@6/dist/clerk.browser.js` : null,
      'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@6/dist/clerk.browser.js',
    ].filter(Boolean);

    return new Promise((resolve, reject) => {
      const failed = [];
      const tryNext = () => {
        const url = urls.shift();
        if (!url) {
          reject(new Error(`Failed to load Clerk from: ${failed.join(', ')}`));
          return;
        }
        const script = document.createElement('script');
        script.crossOrigin = 'anonymous';
        script.setAttribute('data-clerk-publishable-key', clerkPublishableKey);
        script.src = url;
        script.onload = () => resolve();
        script.onerror = () => {
          failed.push(url);
          script.remove();
          tryNext();
        };
        document.head.appendChild(script);
      };
      tryNext();
    });
  }

  // Boot Clerk
  (async () => {
    try {
      const configResp = await fetch('/config');
      if (!configResp.ok) throw new Error(`Config request failed (${configResp.status})`);
      const { clerk_publishable_key, clerk_frontend_api } = await configResp.json();
      if (!clerk_publishable_key) throw new Error('Missing CLERK_PUBLISHABLE_KEY on the server');

      await loadClerkScript(clerk_publishable_key, clerk_frontend_api);
      try {
        const clerk = window.Clerk;
        if (!clerk) throw new Error('Clerk script loaded without creating window.Clerk');
        await clerk.load();
        __clerk = clerk;
        if (!clerk.user) {
          document.getElementById('loading').textContent = 'Redirecting to sign in...';
          await clerk.redirectToSignIn({
            signInFallbackRedirectUrl: '/',
            signUpFallbackRedirectUrl: '/',
          });
          return;
        }
        await initApp();
      } catch (err) {
        showFatal(`Authentication failed: ${err.message}`);
      }
    } catch (err) {
      showFatal(`Startup failed: ${err.message}`);
    }
  })();
</script>
</body>
</html>
