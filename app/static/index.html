<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sync_ai — Meeting Copilot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

    /* ── Top bar ── */
    #topbar { display: flex; align-items: center; gap: 16px; padding: 12px 24px; background: #1a1d27; border-bottom: 1px solid #2d3148; }
    #topbar h1 { font-size: 18px; font-weight: 700; color: #a78bfa; }
    #session-title { font-size: 14px; color: #94a3b8; flex: 1; }
    #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #64748b; }
    #status-dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
    button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; transition: opacity .15s; }
    button:hover { opacity: .85; }
    #btn-start { background: #7c3aed; color: #fff; }
    #btn-end   { background: #dc2626; color: #fff; display: none; }
    #btn-deliver { background: #0ea5e9; color: #fff; display: none; }

    /* ── Start form ── */
    #start-form { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; padding: 40px; }
    #start-form h2 { font-size: 22px; color: #c4b5fd; }
    #start-form input, #start-form textarea {
      width: 100%; max-width: 500px; background: #1e2132; border: 1px solid #3b4270;
      color: #e2e8f0; border-radius: 8px; padding: 10px 14px; font-size: 14px;
    }
    #start-form textarea { height: 70px; resize: vertical; }
    #start-form label { font-size: 12px; color: #94a3b8; align-self: flex-start; max-width: 500px; }

    /* ── Main layout ── */
    #main { display: none; flex: 1; overflow: hidden; }
    #left  { width: 60%; border-right: 1px solid #2d3148; display: flex; flex-direction: column; }
    #right { width: 40%; display: flex; flex-direction: column; }

    /* ── Transcript ── */
    #transcript-header { padding: 12px 16px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #64748b; border-bottom: 1px solid #2d3148; }
    #transcript { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .chunk { background: #1a1d27; border-radius: 8px; padding: 10px 14px; }
    .chunk .speaker { font-size: 11px; font-weight: 700; color: #7c3aed; margin-bottom: 4px; }
    .chunk .text { font-size: 14px; line-height: 1.5; color: #cbd5e1; }

    /* ── Right tabs ── */
    #tabs { display: flex; border-bottom: 1px solid #2d3148; }
    .tab { flex: 1; padding: 12px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #64748b; cursor: pointer; text-align: center; border-bottom: 2px solid transparent; }
    .tab.active { color: #a78bfa; border-bottom-color: #7c3aed; }
    #tab-content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Cards ── */
    .card { background: #1a1d27; border-radius: 8px; padding: 12px 14px; }
    .card .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .card .body { font-size: 13px; line-height: 1.5; color: #cbd5e1; }
    .label.question    { color: #60a5fa; }
    .label.clarification { color: #34d399; }
    .label.talking_point { color: #f59e0b; }
    .label.decision    { color: #a78bfa; }
    .label.blocker     { color: #f87171; }
    .label.commitment  { color: #34d399; }
    .card .meta { font-size: 11px; color: #64748b; margin-top: 4px; }
    .needs-review { border-left: 3px solid #f59e0b; }
    .conf { font-size: 10px; color: #64748b; float: right; }

    /* ── Search ── */
    #search-bar { padding: 12px 24px; background: #1a1d27; border-top: 1px solid #2d3148; display: flex; gap: 8px; }
    #search-input { flex: 1; background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; color: #e2e8f0; padding: 8px 12px; font-size: 13px; }
    #search-results { position: absolute; bottom: 60px; left: 0; right: 0; background: #1a1d27; border: 1px solid #3b4270; border-radius: 8px; margin: 0 24px; padding: 12px; display: none; max-height: 300px; overflow-y: auto; z-index: 10; }
    .sr-item { padding: 8px 0; border-bottom: 1px solid #2d3148; font-size: 13px; color: #cbd5e1; }
    .sr-item:last-child { border-bottom: none; }
    .sr-meta { font-size: 11px; color: #64748b; }

    .empty { color: #4b5563; font-size: 13px; text-align: center; padding: 32px; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>sync_ai</h1>
  <span id="session-title">No active session</span>
  <div id="status-dot"></div>
  <button id="btn-deliver" onclick="deliverNow()">Send to Slack</button>
  <button id="btn-end" onclick="endSession()">End Meeting</button>
  <button id="btn-start" onclick="showStartForm()">Start Meeting</button>
</div>

<!-- Start form -->
<div id="start-form">
  <h2>Start a Meeting Session</h2>
  <label>Meeting URL (Zoom / Google Meet / Teams)</label>
  <input id="meeting-url" type="url" placeholder="https://zoom.us/j/..." />
  <label>Meeting Title</label>
  <input id="meeting-title" type="text" placeholder="Sprint Review" />
  <label>Participant emails (one per line)</label>
  <textarea id="participant-emails" placeholder="alice@company.com&#10;bob@company.com"></textarea>
  <button id="btn-start" style="max-width:500px;width:100%;padding:12px" onclick="startSession()">Join Meeting</button>
</div>

<!-- Main layout -->
<div id="main" style="display:none;flex:1;overflow:hidden;display:flex">
  <div id="left">
    <div id="transcript-header">Live Transcript</div>
    <div id="transcript"><p class="empty">Waiting for transcript...</p></div>
  </div>
  <div id="right">
    <div id="tabs">
      <div class="tab active" onclick="switchTab('suggestions')">Suggestions</div>
      <div class="tab" onclick="switchTab('signals')">Signals</div>
      <div class="tab" onclick="switchTab('actions')">Action Items</div>
    </div>
    <div id="tab-content"><p class="empty">Nothing yet</p></div>
  </div>
</div>

<div id="search-bar" style="display:none">
  <input id="search-input" placeholder="Search past meetings..." onkeydown="if(event.key==='Enter')doSearch()" />
  <button onclick="doSearch()" style="background:#334155;color:#e2e8f0">Search</button>
  <div id="search-results"></div>
</div>

<script>
  let meetingId = null;
  let ws = null;
  let currentTab = 'suggestions';
  let state = { suggestions: [], signals: [], action_items: [] };

  function showStartForm() {}  // already visible

  async function startSession() {
    const url   = document.getElementById('meeting-url').value.trim();
    const title = document.getElementById('meeting-title').value.trim() || 'Meeting';
    const emails = document.getElementById('participant-emails').value.trim().split('\n').filter(Boolean);
    if (!url) { alert('Please enter a meeting URL'); return; }

    const res = await fetch('/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ meeting_url: url, title, participant_emails: emails }),
    });
    const data = await res.json();
    meetingId = data.meeting_id;

    document.getElementById('start-form').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    document.getElementById('search-bar').style.display = 'flex';
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-end').style.display = '';
    document.getElementById('btn-deliver').style.display = '';
    document.getElementById('status-dot').className = 'active';
    document.getElementById('session-title').textContent = title;

    connectWS();
  }

  function connectWS() {
    ws = new WebSocket(`ws://${location.host}/ws/${meetingId}`);
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'transcript') appendTranscript(msg.data);
      else if (msg.type === 'suggestion') { state.suggestions.push(msg.data); if (currentTab === 'suggestions') renderTab(); }
      else if (msg.type === 'signal')     { state.signals.push(msg.data);     if (currentTab === 'signals')     renderTab(); }
      else if (msg.type === 'action_item'){ state.action_items.push(msg.data); if (currentTab === 'actions')     renderTab(); }
      else if (msg.type === 'meeting_ended') { document.getElementById('status-dot').className = ''; }
    };
    ws.onclose = () => setTimeout(connectWS, 2000);
  }

  function appendTranscript(chunk) {
    const box = document.getElementById('transcript');
    const empty = box.querySelector('.empty');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'chunk';
    div.innerHTML = `<div class="speaker">${chunk.speaker}</div><div class="text">${chunk.text}</div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.className = 'tab' + (['suggestions','signals','actions'][i] === tab ? ' active' : '');
    });
    renderTab();
  }

  function renderTab() {
    const content = document.getElementById('tab-content');
    content.innerHTML = '';
    const items = currentTab === 'suggestions' ? state.suggestions
                : currentTab === 'signals'     ? state.signals
                : state.action_items;
    if (!items.length) { content.innerHTML = '<p class="empty">Nothing yet</p>'; return; }

    items.slice().reverse().forEach(item => {
      const div = document.createElement('div');
      if (currentTab === 'suggestions') {
        const t = item.suggestion_type || item.type || '';
        div.className = 'card';
        div.innerHTML = `<div class="label ${t}">${t.replace('_',' ')}<span class="conf">${Math.round((item.confidence||0)*100)}%</span></div><div class="body">${item.text}</div>`;
      } else if (currentTab === 'signals') {
        div.className = 'card';
        div.innerHTML = `<div class="label ${item.signal_type}">${item.signal_type}</div><div class="body">${item.summary}</div><div class="meta">${item.speaker}</div>`;
      } else {
        div.className = 'card' + (item.needs_review ? ' needs-review' : '');
        const flag = item.needs_review ? ' ⚠️ needs review' : '';
        div.innerHTML = `<div class="body"><strong>${item.task}</strong>${flag}</div><div class="meta">Owner: ${item.owner_name||'Unassigned'} · Due: ${item.deadline||'—'}</div>`;
      }
      content.appendChild(div);
    });
  }

  async function endSession() {
    if (!meetingId) return;
    await fetch(`/sessions/${meetingId}`, { method: 'DELETE' });
    meetingId = null;
    document.getElementById('btn-end').style.display = 'none';
    document.getElementById('btn-deliver').style.display = 'none';
    document.getElementById('status-dot').className = '';
    document.getElementById('session-title').textContent = 'Session ended';
  }

  async function deliverNow() {
    if (!meetingId) return;
    await fetch(`/sessions/${meetingId}/deliver`, { method: 'POST' });
    alert('Sent to Slack!');
  }

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const res = await fetch(`/search?q=${encodeURIComponent(q)}&limit=5`);
    const data = await res.json();
    const box = document.getElementById('search-results');
    box.style.display = 'block';
    box.innerHTML = data.results.length ? data.results.map(r =>
      `<div class="sr-item"><div>${r.text}</div><div class="sr-meta">Meeting: ${r.meeting_id}</div></div>`
    ).join('') : '<div class="sr-item">No results found.</div>';
  }
</script>
</body>
</html>
